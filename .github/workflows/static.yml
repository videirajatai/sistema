# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"] # Mude para "master" se a sua branch principal for master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # Baixa apenas a versão atual do código (muito mais rápido)

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Força o uso do Node 24 sem procurar arquivos que não existem

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Envia os arquivos da raiz do seu projeto

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
