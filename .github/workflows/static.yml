# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Busca todo o histórico (útil se você tiver subdiretórios)

      # 🔹 PASSO OPCIONAL: Configurar Node.js 24 para ações que precisam (elimina aviso)
      - name: Setup Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: '24.x'

      # 🔹 GARANTE QUE .nojekyll EXISTA (para evitar build do Jekyll)
      - name: Ensure .nojekyll exists
        run: |
          if [ ! -f .nojekyll ]; then
            touch .nojekyll
            echo "Arquivo .nojekyll criado para evitar build do Jekyll."
          fi

      # 🔹 CONFIGURA O PAGES (necessário para o deploy funcionar)
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 🔹 FAZ UPLOAD DOS ARQUIVOS
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publica toda a raiz do repositório
          path: '.'

      # 🔹 DEPLOY FINAL
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
