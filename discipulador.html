<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Discipulador - Videira Jataí</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
      /* --- ESTILOS ESPECÍFICOS DO DISCIPULADOR --- */
      
      /* Widget do DailyVerses */
      #dailyVersesWrapper, 
      #dailyVersesWrapper a, 
      #dailyVersesWrapper div,
      #dailyVersesWrapper span,
      #dailyVersesWrapper .vV, 
      #dailyVersesWrapper .vR {
          color: white !important;
          text-decoration: none !important;
          font-family: 'Inter', sans-serif !important;
      }
      
      #dailyVersesWrapper .vV {
          font-size: 1.05rem !important;
          font-weight: 500 !important;
          line-height: 1.5 !important;
          margin-bottom: 8px !important;
      }
      
      #dailyVersesWrapper .vR {
          font-weight: 700 !important;
          opacity: 0.9 !important;
          display: block !important;
          text-align: right !important;
      }

      .container { max-width: 900px; margin: 0 auto; padding: 15px 15px; }

      /* HEADER */
      .header { display: flex; align-items: center; justify-content: space-between; background: var(--card-bg); padding: 15px 20px; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 20px; border-left: 5px solid var(--primary); }
      .header h3 { margin: 0; color: var(--primary); font-weight: 800; text-transform: uppercase; font-size: 1.1rem; }
      .btn-refresh { background: none; border: none; font-size: 1.2rem; color: var(--text-light); cursor: pointer; transition: 0.3s; }
      .btn-refresh:hover { color: var(--primary); transform: rotate(90deg); }

      /* DASHBOARD / VERSÍCULO DO DIA (NOVO) */
      .stat-card { 
          background: linear-gradient(135deg, var(--primary), #5c0016); 
          color: white; 
          padding: 25px 20px; 
          border-radius: var(--radius); 
          text-align: center; 
          box-shadow: 0 4px 15px rgba(128, 0, 32, 0.2); 
          margin-bottom: 15px; 
          position: relative; 
          overflow: hidden; 
      }
      
      .stat-card::before { 
          content: "\f10d"; 
          font-family: "Font Awesome 5 Free"; 
          font-weight: 900; 
          position: absolute; 
          top: -10px; 
          left: 10px; 
          font-size: 4rem; 
          opacity: 0.1; 
      }
      
      .titulo-versiculo { 
          text-transform: uppercase; 
          letter-spacing: 2px; 
          font-size: 0.75rem; 
          color: #facc15; 
          font-weight: 700; 
          margin-bottom: 10px; 
          display: block; 
      }

      /* BOTÃO BÍBLIA DESTAQUE (NOVO) */
      .btn-biblia-destaque { 
          width: 100%; 
          background: linear-gradient(135deg, var(--ouro-videira), var(--ouro-escuro)); 
          color: white; 
          border: none; 
          padding: 16px; 
          border-radius: var(--radius); 
          font-size: 1rem; 
          font-weight: 700; 
          cursor: pointer; 
          display: flex; 
          align-items: center; 
          justify-content: center; 
          gap: 10px; 
          box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3); 
          margin-bottom: 20px; 
          transition: 0.3s; 
      }
      
      .btn-biblia-destaque:hover { 
          transform: translateY(-2px); 
          box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4); 
      }

      /* MENU NAVEGAÇÃO */
      .nav-menu { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
      .nav-btn { flex: 1 1 30%; min-width: 100px; padding: 12px; border: none; border-radius: 10px; background: white; color: var(--text-light); font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.03); font-size: 0.8rem; }
      .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(128, 0, 32, 0.3); }

      /* GRID & CARDS */
      .member-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
      @media (min-width: 600px) { .member-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); } }
      .member-card { background: var(--card-bg); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); border: 1px solid white; display: flex; flex-direction: column; gap: 10px; }
      .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
      .card-name { font-size: 1.1rem; font-weight: 700; color: var(--text-main); margin: 0; }
      .cat-badge { font-size: 0.7rem; padding: 3px 8px; border-radius: 6px; background: #eee; color: #555; font-weight: bold; border: 1px solid transparent; }
      .card-info { font-size: 0.85rem; color: var(--text-light); display: flex; align-items: center; gap: 6px; }
      .status-row { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
      .status-pill { flex: 1 1 auto; text-align: center; font-size: 0.7rem; padding: 5px 8px; border-radius: 6px; background: #f0f0f0; color: #999; font-weight: 600; white-space: nowrap; }
      .status-pill.active { background: var(--success-bg); color: var(--success-text); border: 1px solid #c3e6cb; }
      .btn-zap { background: #f0fdf4; color: #166534; border-color: #bbf7d0; text-decoration: none; display: block; width: 100%; text-align: center; padding: 10px; border-radius: 8px; font-weight: bold; }
      
      /* TABELAS */
      .table-clean { width: 100%; border-collapse: collapse; background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); border: 1px solid #ddd; margin-top: 10px; }
      .table-clean th { background: var(--primary); color: white; padding: 12px; text-align: left; font-size: 0.85rem; text-transform: uppercase; font-weight: 600; }
      .table-clean td { padding: 12px; border-bottom: 1px solid #eee; color: #333; font-size: 0.9rem; }
      
      /* FORMS */
      .form-box { background: white; padding: 20px; border-radius: var(--radius); box-shadow: var(--shadow); }
      label { display: block; margin-bottom: 5px; color: var(--text-light); font-weight: 600; font-size: 0.85rem; }
      input, select, textarea { width: 100%; padding: 12px; background: var(--input-bg); margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; box-sizing: border-box; }
      .btn-save { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s;}
      .btn-add-member { background: var(--success-text); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 5px; }

      /* RELATÓRIOS */
      .report-list-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.02); cursor: pointer; transition: 0.2s; }
      
      /* PALAVRAS & MODAL */
      .word-list-item { background: white; border-radius: var(--radius); padding: 15px; margin-bottom: 10px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between; cursor: pointer; border-left: 4px solid var(--accent); transition: 0.2s; }
      .word-date { font-weight: 800; color: var(--text-main); font-size: 1rem; }
      .word-theme { font-size: 0.85rem; color: var(--text-light); margin-top: 2px; }

      .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: flex-end; backdrop-filter: blur(2px); }
      .modal-content { background: white; width: 100%; max-width: 800px; height: 85vh; border-radius: 20px 20px 0 0; padding: 20px; overflow-y: auto; position: relative; animation: slideUp 0.3s ease-out; }
      @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
      .btn-close-modal { position: absolute; top: 15px; right: 15px; background: #eee; border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer;}
      
      .btn-youtube { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; background-color: #FF0000; color: white; font-weight: bold; text-decoration: none; border-radius: 8px; margin-bottom: 15px; }

      /* BÍBLIA */
      :root { --ouro-videira: #D4AF37; --ouro-escuro: #b5952f; }
      .biblia-offcanvas { position: fixed; top: 0; right: -100%; width: 100%; max-width: 450px; height: 100vh; background-color: #ffffff; box-shadow: -5px 0 25px rgba(0,0,0,0.1); z-index: 2000; transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
      .biblia-offcanvas.aberto { right: 0; }
      #biblia-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1999; display: none; opacity: 0; transition: opacity 0.3s ease; }
      .biblia-header { background-color: var(--ouro-videira); color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
      .biblia-controles { padding: 15px; background-color: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; gap: 10px; }
      .biblia-controles select { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; }
      .biblia-texto-area { padding: 25px 20px; overflow-y: auto; flex: 1; line-height: 1.8; font-size: 1rem; color: #334155; }
    </style>
  </head>
  <body>

    <script>
      const paginasPermitidas = JSON.parse(sessionStorage.getItem('paginasPermitidas') || "[]");
      if(!sessionStorage.getItem('usuarioLogado') || !paginasPermitidas.includes("discipulador")) {
          window.location.href = "index.html";
      }
    </script>

    <div class="container">
      
      <div class="header">
        <div style="display:flex; align-items:center; gap:12px;">
          <img src="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png" style="width: 110px;">
          <h3>Painel Discipulador</h3>
        </div>
        <button onclick="carregarTudo()" class="btn-refresh"><i id="iconRefresh" class="fas fa-sync-alt"></i></button>
      </div>

      <div class="stat-card" id="card-versiculo">
        <span class="titulo-versiculo"><i class="fas fa-star"></i> Versículo do Dia</span>
        <div id="dailyVersesWrapper"></div>
        <script async defer src="https://dailyverses.net/get/verse.js?language=arc"></script>
      </div>

      <button onclick="abrirBiblia()" class="btn-biblia-destaque">
        <i class="fas fa-bible"></i>Bíblia A Mensagem
      </button>

      <div class="nav-menu">
        <button onclick="mudarSecao('lista')" class="nav-btn active" id="btn-lista"><i class="fas fa-users"></i> Membros</button>
        <button onclick="mudarSecao('celulas')" class="nav-btn" id="btn-celulas"><i class="fas fa-network-wired"></i> Células</button>
        <button onclick="mudarSecao('relatorios')" class="nav-btn" id="btn-relatorios"><i class="fas fa-clipboard-list"></i> Relatórios</button>
        <button onclick="mudarSecao('agenda')" class="nav-btn" id="btn-agenda"><i class="far fa-calendar-alt"></i> Agenda</button>
        <button onclick="mudarSecao('palavras')" class="nav-btn" id="btn-palavras"><i class="fas fa-book-open"></i> Palavras</button>
      </div>

      <div id="secao-lista">
        <div style="background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: var(--shadow);">
          <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
             <h4 style="margin:0; color: var(--text-light);"><span id="totalMembros">0</span> Membros</h4>
          </div>
          <div style="display:flex; gap:10px;">
            <input type="text" id="inputBusca" placeholder="🔍 Buscar membro..." onkeyup="filtrarMembros()" style="margin:0; flex:2;">
            <select id="filtroCelula" onchange="filtrarMembros()" style="margin:0; flex:1;">
               <option value="">Todas</option>
            </select>
          </div>
        </div>
        <div id="gridMembros" class="member-grid">
           <p style="text-align:center; color:#999;">Carregando...</p>
        </div>
      </div>

      <div id="secao-celulas" class="hidden">
        <h4 style="color: var(--primary); margin-top:0; margin-bottom: 15px;">Quadro de Células (Discipulado)</h4>
        <div style="overflow-x:auto;">
          <table class="table-clean" id="tabelaCelulas">
            <thead><tr><th>Célula</th><th>Líder</th><th>Dia/Horário</th></tr></thead>
            <tbody id="corpoCelulas"></tbody>
          </table>
        </div>
      </div>

      <div id="secao-relatorios" class="hidden">
        <div style="background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: var(--shadow);">
          <label>Filtrar por Célula</label>
          <select id="filtroRelCelula" onchange="filtrarRelatorios()">
            <option value="">Todas as Células</option>
          </select>
        </div>
        <div id="listaRelatorios"></div>
      </div>

      <div id="secao-agenda" class="hidden">
         <h4 style="color: var(--accent); margin-top:0; margin-bottom: 15px;">Agenda da Igreja</h4>
         <div id="listaAgenda" class="member-grid">
            <p style="text-align:center; color:#999; grid-column: 1 / -1;">Carregando...</p>
         </div>
      </div>

      <div id="secao-palavras" class="hidden">
         <h4 style="color: var(--accent); margin-top:0; margin-bottom: 15px;">Palavras e Estudos</h4>
         <div id="listaPalavras"></div>
      </div>

    </div> <div id="modalPalavra" class="modal-overlay hidden" onclick="fecharModal(event)">
      <div class="modal-content" onclick="event.stopPropagation()">
        <button class="btn-close-modal" onclick="fecharModal(null)">&times;</button>
        <h3 id="modalTitulo" style="color:var(--primary); margin-top:10px;"></h3>
        <small id="modalData" style="color:#777; display:block; margin-bottom:15px;"></small>
        <a id="btnLinkYoutube" href="#" target="_blank" class="btn-youtube hidden"><i class="fab fa-youtube"></i> Assistir no YouTube</a>
        <div id="modalTexto" style="line-height: 1.6; color: #444; font-size: 0.95rem; white-space: pre-wrap; margin-top: 15px;"></div>
      </div>
    </div>

    <div id="biblia-overlay" onclick="fecharBiblia()"></div>
    <div id="painel-biblia" class="biblia-offcanvas">
      <div class="biblia-header">
        <div style="display: flex; align-items: center; gap: 10px;">
          <i class="fas fa-bible" style="font-size: 1.2rem;"></i>
          <h2 style="margin: 0;">A Mensagem</h2>
        </div>
        <button style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;" onclick="fecharBiblia()"><i class="fas fa-times"></i></button>
      </div>
      <div class="biblia-controles">
        <select id="biblia-livro" onchange="atualizarCapitulos()"></select>
        <select id="biblia-capitulo" disabled><option value="">Capítulo</option></select>
        <button class="btn-ler-ouro" style="background:var(--ouro-videira); color:white; padding:10px; border:none; border-radius:8px;" onclick="lerCapitulo()"><i class="fas fa-search"></i> Ler</button>
      </div>
      <div class="biblia-texto-area" id="biblia-conteudo">
        <p class="biblia-placeholder">Selecione um livro e um capítulo para começar a leitura.</p>
      </div>
    </div>

    <script>
      const API_URL = sessionStorage.getItem('urlApi');
      let dadosMembros = [], dadosCelulas = [], dadosRelatorios = [], listaPalavras = [], listaAgenda = [];

      window.onload = () => {
          preencherLivros();
          carregarTudo();
      };

      // ==========================================
      // FETCH E SUPABASE
      // ==========================================
      
      // Motor Google para as planilhas que ainda não foram migradas (ex: Agenda e Relatórios se aplicável)
      async function fetchGoogle(action, payload = {}) {
          payload.usuarioAtivo = sessionStorage.getItem('usuarioLogado');
          try {
              let res = await fetch(API_URL, {
                  method: 'POST',
                  body: JSON.stringify({ action: action, payload: payload })
              });
              let json = await res.json();
              if (json.status === "sucesso") return json.dados || json.mensagem;
              else throw new Error(json.mensagem);
          } catch(e) {
              console.error("Erro na API Google:", e);
              return null;
          }
      }

      // Função Principal de Carregamento Migrado para Supabase
      async function carregarTudo() {
          const icon = document.getElementById('iconRefresh');
          if(icon) icon.classList.add('fa-spin');

          try {
              // 1. SUPABASE (Membros, Células e Palavras)
              // Usando as funções utilitárias que você definiu no ambiente (ex: lerSupabase)
              dadosMembros = await lerSupabase('membros');
              dadosCelulas = await lerSupabase('celulas');
              
              // No Discipulador, em geral filtramos os dados para a rede dele. 
              // Assumindo que o filtro padrão ou a query já traz o correto
              document.getElementById('totalMembros').innerText = dadosMembros.length;
              
              renderizarMembros(dadosMembros);
              renderizarCelulas(dadosCelulas);
              preencherSelects(dadosCelulas);

              listaPalavras = await lerSupabase('palavras');
              if (listaPalavras) {
                  listaPalavras.reverse();
                  renderizarPalavras(listaPalavras);
              }

              // 2. RELATÓRIOS (Supabase ou Google Sheets)
              // Se relatórios já estiver no supabase, troque fetchGoogle por lerSupabase('relatorios')
              try {
                 dadosRelatorios = await fetchGoogle('buscarRelatorios');
                 filtrarRelatorios();
              } catch(e) { console.error(e); }

              // 3. AGENDA DA IGREJA (Mantendo do Google Sheets conforme seu código original)
              try {
                  const agendaRes = await fetchGoogle('buscarAgenda');
                  listaAgenda = agendaRes || [];
                  renderizarAgenda(listaAgenda);
              } catch(e) { console.error(e); }

          } catch (error) {
              console.error("Erro Geral de Carregamento:", error);
          }

          if(icon) icon.classList.remove('fa-spin');
      }

      function mudarSecao(s) {
          ['lista','celulas','relatorios','palavras','agenda'].forEach(id => {
              if(document.getElementById('secao-'+id)) {
                  document.getElementById('secao-'+id).classList.add('hidden');
              }
          });
          document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
          
          if(document.getElementById('secao-'+s)) document.getElementById('secao-'+s).classList.remove('hidden');
          if(document.getElementById('btn-'+s)) document.getElementById('btn-'+s).classList.add('active');
      }

      // ==========================================
      // RENDERIZAÇÃO E FILTROS
      // ==========================================

      function renderizarMembros(lista) {
          const grid = document.getElementById('gridMembros');
          grid.innerHTML = '';
          if(!lista || lista.length === 0){
             grid.innerHTML = '<p style="text-align:center; color:#999;">Nenhum membro encontrado.</p>';
             return;
          }

          const check = (val) => (String(val).toLowerCase()==='sim' || val===true) ? 'active' : '';

          lista.forEach(m => {
              let nome = m.nome || 'Sem Nome';
              let celula = m.celula || 'Sem Célula';
              let tel = m.telefone || '';
              
              grid.innerHTML += `
                  <div class="member-card">
                      <div class="card-header">
                          <h4 class="card-name">${nome}</h4>
                          <span class="cat-badge">${m.tipo || 'Membro'}</span>
                      </div>
                      <div class="card-info"><i class="fas fa-network-wired"></i> ${celula}</div>
                      
                      <div class="status-row">
                          <span class="status-pill ${check(m.batizado)}">Batismo</span>
                          <span class="status-pill ${check(m.cursao)}">Cursão</span>
                          <span class="status-pill ${check(m.ctl)}">CTL</span>
                          <span class="status-pill ${check(m.encontro)}">Encontro</span>
                      </div>
                      
                      ${tel ? `<a href="https://wa.me/55${tel.replace(/\D/g,'')}" target="_blank" class="btn-zap"><i class="fab fa-whatsapp"></i> Chamar no WhatsApp</a>` : ''}
                  </div>
              `;
          });
      }

      function filtrarMembros() {
          const busca = document.getElementById('inputBusca').value.toLowerCase();
          const celulaFiltro = document.getElementById('filtroCelula').value.toLowerCase();
          
          const cards = document.getElementById('gridMembros').getElementsByClassName('member-card');
          Array.from(cards).forEach(card => {
              const texto = card.innerText.toLowerCase();
              const mCelula = card.querySelector('.card-info').innerText.toLowerCase();
              
              const matchBusca = texto.includes(busca);
              const matchCelula = celulaFiltro === "" || mCelula.includes(celulaFiltro);
              
              card.style.display = (matchBusca && matchCelula) ? 'flex' : 'none';
          });
      }

      function renderizarCelulas(lista) {
          const corpo = document.getElementById('corpoCelulas');
          corpo.innerHTML = '';
          lista.forEach(c => {
              corpo.innerHTML += `<tr>
                  <td><strong>${c.nome || c[0] || '-'}</strong></td>
                  <td>${c.lider || c[2] || '-'}</td>
                  <td>${c.dia_hora || c[3] || '-'}</td>
              </tr>`;
          });
      }

      function preencherSelects(celulas) {
          const s1 = document.getElementById('filtroCelula');
          const s2 = document.getElementById('filtroRelCelula');
          if(!s1 || !s2) return;
          
          s1.innerHTML='<option value="">Todas</option>';
          s2.innerHTML='<option value="">Todas as Células</option>';
          
          celulas.forEach(c => {
              let nome = c.nome || c[0];
              s1.innerHTML += `<option value="${nome}">${nome}</option>`;
              s2.innerHTML += `<option value="${nome}">${nome}</option>`;
          });
      }

      // --- RELATÓRIOS ---
      function filtrarRelatorios() {
          const divLista = document.getElementById('listaRelatorios');
          divLista.innerHTML = '';
          const celulaFiltro = document.getElementById('filtroRelCelula').value.toLowerCase();
          
          if(!dadosRelatorios || dadosRelatorios.length === 0) {
              divLista.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">Nenhum relatório encontrado.</div>';
              return;
          }

          const listaFiltrada = dadosRelatorios.filter(r => {
              // Ajuste o índice ou propriedade conforme o modelo de relatórios
              const celulaRow = String(r.celula || r[1]).toLowerCase();
              return celulaFiltro === "" || celulaRow.includes(celulaFiltro);
          });

          if(listaFiltrada.length === 0) {
              divLista.innerHTML = '<p style="text-align:center; color:#999;">Nenhum relatório para esta célula.</p>';
              return;
          }

          listaFiltrada.forEach(r => {
              divLista.innerHTML += `
                  <div class="report-list-item">
                      <div>
                          <strong style="color:var(--primary);">${r.celula || r[1]}</strong>
                          <div style="font-size:0.8rem; color:#777; margin-top:3px;">${r.data || r[0]} | ${r.total || r[3]} presentes</div>
                      </div>
                      <i class="fas fa-file-alt" style="color:#ccc;"></i>
                  </div>
              `;
          });
      }

      // --- AGENDA ---
      function renderizarAgenda(lista) {
          const div = document.getElementById('listaAgenda');
          div.innerHTML = '';
          if(!lista || lista.length === 0) {
              div.innerHTML = '<p style="text-align:center; color:#999; grid-column: 1 / -1;">Nenhum evento na agenda.</p>';
              return;
          }
          
          lista.forEach((a) => {
              let corCategoria = 'var(--primary)';
              // Use seus próprios critérios de cor
              div.innerHTML += `
                  <div class="member-card" style="border-left: 5px solid ${corCategoria}">
                      <div class="card-header">
                          <h4 class="card-name" style="color: ${corCategoria};">${a[1] || a.titulo}</h4>
                      </div>
                      <div class="card-info" style="color: #333; font-weight: bold;"><i class="far fa-calendar-check"></i> ${a[0] || a.data} ${a[2] ? '- ' + a[2] : ''}</div>
                      ${a[5] || a.descricao ? `<div style="font-size:0.85rem; color:#666; margin-top:10px; line-height:1.4;">${a[5] || a.descricao}</div>` : ''}
                  </div>
              `;
          });
      }

      // --- PALAVRAS ---
      function renderizarPalavras(lista) {
          const div = document.getElementById('listaPalavras');
          div.innerHTML = '';
          if(!lista || lista.length === 0) {
              div.innerHTML = '<p style="text-align:center; color:#999;">Nenhuma palavra encontrada.</p>';
              return;
          }
          
          lista.forEach((p, index) => {
              let data = p.data || p[0];
              let titulo = p.titulo || p[1];
              div.innerHTML += `
                  <div class="word-list-item" onclick="abrirPalavra(${index})">
                      <div>
                          <div class="word-date"><i class="far fa-calendar-alt"></i> ${data}</div>
                          <div class="word-theme">${titulo}</div>
                      </div>
                      <i class="fas fa-chevron-right" style="color:var(--text-light);"></i>
                  </div>
              `;
          });
      }

      function abrirPalavra(index) {
          const p = listaPalavras[index];
          document.getElementById('modalTitulo').innerText = p.titulo || p[1];
          document.getElementById('modalData').innerText = p.data || p[0];
          document.getElementById('modalTexto').innerHTML = (p.texto || p[2]).replace(/\n/g, '<br>');
          
          const link = p.link_youtube || p[3];
          const btn = document.getElementById('btnLinkYoutube');
          if(link && link.includes('http')) {
              btn.href = link;
              btn.classList.remove('hidden');
          } else {
              btn.classList.add('hidden');
          }
          document.getElementById('modalPalavra').classList.remove('hidden');
      }

      function fecharModal(e) {
          if(e === null || e.target.id === 'modalPalavra') {
              document.getElementById('modalPalavra').classList.add('hidden');
          }
      }

      function preencherLivros() {
          const selectLivro = document.getElementById('biblia-livro');
          selectLivro.innerHTML = '<option value="">Livro</option>';
          dadosBiblia.forEach((livro, index) => {
              let option = document.createElement('option');
              option.value = livro.id;
              option.text = livro.nome;
              if (index >= 39) option.style.fontWeight = "bold"; // NT
              selectLivro.appendChild(option);
          });
      }

      function atualizarCapitulos() {
          const selectLivro = document.getElementById('biblia-livro');
          const selectCapitulo = document.getElementById('biblia-capitulo');
          selectCapitulo.innerHTML = '<option value="">Capítulo</option>';
          if (selectLivro.value === "") {
              selectCapitulo.disabled = true;
              return;
          }
          const livro = dadosBiblia.find(l => l.id === selectLivro.value);
          for (let i = 1; i <= livro.caps; i++) {
              let option = document.createElement('option');
              option.value = i;
              option.text = i;
              selectCapitulo.appendChild(option);
          }
          selectCapitulo.disabled = false;
      }

      function abrirBiblia() {
          document.getElementById('biblia-overlay').style.display = 'block';
          setTimeout(() => document.getElementById('biblia-overlay').style.opacity = '1', 10);
          document.getElementById('painel-biblia').classList.add('aberto');
      }

      function fecharBiblia() {
          document.getElementById('biblia-overlay').style.opacity = '0';
          setTimeout(() => document.getElementById('biblia-overlay').style.display = 'none', 300);
          document.getElementById('painel-biblia').classList.remove('aberto');
      }

      async function lerCapitulo() {
          const selectLivro = document.getElementById('biblia-livro');
          const livro = selectLivro.value;
          const capitulo = document.getElementById('biblia-capitulo').value;
          const conteudo = document.getElementById('biblia-conteudo');

          if (!livro || !capitulo) { alert("Por favor, selecione um livro e o capítulo."); return; }

          conteudo.innerHTML = "<p class='biblia-placeholder'><i class='fas fa-spinner fa-spin'></i> Lendo do GitHub...</p>";
          
          try {
              const urlGithub = `https://raw.githubusercontent.com/videirajatai/testes/main/biblia/${livro}/${capitulo}.json`;
              const resposta = await fetch(urlGithub);
              if (!resposta.ok) throw new Error("Capítulo não encontrado");
              
              const versiculos = await resposta.json();
              conteudo.innerHTML = `<h3 style="color: var(--ouro-videira); margin-bottom: 25px; text-transform: capitalize;">${selectLivro.options[selectLivro.selectedIndex].text} ${capitulo}</h3>`;
              
              versiculos.forEach(v => {
                  let blocoHTML = `<div style="margin-bottom: 15px;">`;
                  if (v.title) blocoHTML += `<h4 style="color: #475569; font-size: 0.95rem; margin-top: 25px; margin-bottom: 10px; text-transform: uppercase;">${v.title}</h4>`;
                  blocoHTML += `<p style="margin: 0; text-align: justify;"><sup style="color: var(--ouro-videira); font-weight: bold; margin-right: 4px;">${v.number}</sup>${v.content}</p></div>`;
                  conteudo.innerHTML += blocoHTML;
              });
          } catch (e) {
              conteudo.innerHTML = `<p style="color: #dc3545; text-align: center;">Erro ao carregar da base. Tente novamente mais tarde.</p>`;
          }
      }
    </script>
