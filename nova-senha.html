<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Videira</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f4f7f6; font-family: 'Inter', sans-serif; margin: 0; }
        .card { background: white; padding: 40px 35px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        .card h2 { color: #600018; font-weight: 700; margin-top: 0; }
        .card p { color: #64748b; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 14px 16px; margin: 10px 0; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #f8fafc; transition: 0.3s; }
        input:focus { border-color: #600018; background: white; outline: none; }
        button { width: 100%; padding: 14px; background: #600018; color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #4a0012; transform: translateY(-1px); }
        button:disabled { background: #a0aec0; cursor: not-allowed; transform: none; }
        .erro { color: #e53e3e; font-size: 14px; margin-top: 15px; display: none; background: #fff5f5; padding: 10px; border-radius: 8px; border: 1px solid #fed7d7; }
        .sucesso { color: #0f5132; font-size: 14px; margin-top: 15px; display: none; background: #d1e7dd; padding: 10px; border-radius: 8px; border: 1px solid #badbcc; }
        .logo { width: 70px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://img.linkme.bio/img/2021/05/10141826/logo-videira-circulo-1.png" alt="Logo Videira" class="logo">
        <h2>Criar Nova Senha</h2>
        <p>Digite sua nova senha de <strong>6 dígitos numéricos</strong> abaixo.</p>
        
        <input type="password" id="nova-senha" placeholder="6 dígitos numéricos (ex: 123456)" inputmode="numeric" maxlength="6" pattern="[0-9]*" required autocomplete="new-password">
        <input type="password" id="confirma-senha" placeholder="Repita a nova senha" inputmode="numeric" maxlength="6" pattern="[0-9]*" required autocomplete="new-password">
        
        <button id="btn-salvar" onclick="salvarNovaSenha()">Salvar Nova Senha</button>
        <p id="msg-erro" class="erro"></p>
        <p id="msg-sucesso" class="sucesso"></p>
    </div>

    <script>
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function salvarNovaSenha() {
            const senha1 = document.getElementById('nova-senha').value.trim();
            const senha2 = document.getElementById('confirma-senha').value.trim();
            const erro = document.getElementById('msg-erro');
            const sucesso = document.getElementById('msg-sucesso');
            const btn = document.getElementById('btn-salvar');

            // Resetar mensagens
            erro.style.display = 'none';
            sucesso.style.display = 'none';

            // 1. Campos vazios?
            if (!senha1 || !senha2) {
                erro.innerText = "Preencha os dois campos!";
                erro.style.display = 'block';
                return;
            }

            // 2. Apenas 6 dígitos numéricos?
            if (!/^\d{6}$/.test(senha1)) {
                erro.innerText = "A senha deve conter exatamente 6 dígitos numéricos (0-9).";
                erro.style.display = 'block';
                return;
            }

            // 3. As senhas coincidem?
            if (senha1 !== senha2) {
                erro.innerText = "As senhas não são iguais!";
                erro.style.display = 'block';
                return;
            }

            // Bloquear botão
            btn.disabled = true;
            btn.innerText = "Salvando...";

            try {
                // 🔹 SEM sufixo - a senha é exatamente o que o usuário digitou
                const { data, error } = await supabaseClient.auth.updateUser({
                    password: senha1  // <-- removido o "-videira"
                });

                if (error) throw error;

                // Sucesso
                sucesso.innerText = "Senha redefinida com sucesso! Redirecionando para o login...";
                sucesso.style.display = 'block';
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 2000);

            } catch (error) {
                erro.innerText = "Erro ao redefinir: " + error.message;
                erro.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "Salvar Nova Senha";
            }
        }
    </script>
</body>
</html>
